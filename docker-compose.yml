services:
  postgres:
    # pgvector image = Postgres 16 + the `vector` extension, for RAG embeddings.
    image: pgvector/pgvector:pg16
    container_name: luxshop-postgres
    environment:
      POSTGRES_DB: luxshop
      POSTGRES_USER: luxshop
      POSTGRES_PASSWORD: luxshop
    ports:
      # Host 55432 -> container 5432 (avoids clashing with locally installed Postgres on 5432/5433).
      - "55432:5432"
    volumes:
      - luxshop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luxshop -d luxshop"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: luxshop-backend
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      POSTGRES_URL: jdbc:postgresql://postgres:5432/luxshop
      POSTGRES_USER: luxshop
      POSTGRES_PASSWORD: luxshop
      # Override in production with a real secret.
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      # Gemini API key for Spring AI embeddings, read from the gitignored .env
      # (falls back to a dummy so the app still boots without a key).
      GEMINI_API_KEY: ${GEMINI_API_KEY:-dummy-key}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # The Next.js server proxies /api/* to the backend container (baked at build time).
        BACKEND_URL: http://backend:8080
    container_name: luxshop-frontend
    environment:
      # Also needed at RUNTIME: server-side rendering fetches the backend directly.
      BACKEND_URL: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  luxshop_pgdata:
