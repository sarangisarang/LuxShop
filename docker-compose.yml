services:
  postgres:
    image: postgres:16-alpine
    container_name: luxshop-postgres
    environment:
      POSTGRES_DB: luxshop
      POSTGRES_USER: luxshop
      POSTGRES_PASSWORD: luxshop
    ports:
      # Host 55432 -> container 5432 (avoids clashing with locally installed Postgres on 5432/5433).
      - "55432:5432"
    volumes:
      - luxshop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luxshop -d luxshop"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  luxshop_pgdata:
