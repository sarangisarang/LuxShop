# Default profile: in-memory H2 (used by tests / CI and quick local runs).
# Schema is created by Hibernate and seeded from data.sql; Flyway is disabled here
# and only runs under the "postgres" profile.
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# The H2 web console is a security risk if exposed, so it is off by default and
# only enabled under the "dev" profile (application-dev.properties).
spring.h2.console.enabled=false
spring.jpa.defer-datasource-initialization=true
spring.flyway.enabled=false
