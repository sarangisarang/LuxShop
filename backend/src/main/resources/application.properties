# Default profile: in-memory H2 (used by tests / CI and quick local runs).
# Schema is created by Hibernate and seeded from data.sql; Flyway is disabled here
# and only runs under the "postgres" profile.
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# The H2 web console is a security risk if exposed, so it is off by default and
# only enabled under the "dev" profile (application-dev.properties).
spring.h2.console.enabled=false
spring.jpa.defer-datasource-initialization=true
# Read data.sql as UTF-8 so non-ASCII seed data (e.g. translations) isn't
# corrupted on platforms whose default charset is not UTF-8 (e.g. Windows).
spring.sql.init.encoding=UTF-8
spring.flyway.enabled=false

# Spring AI (embeddings + pgvector store) needs Postgres + the vector extension +
# an API key, so it is disabled in the default/H2 profile — tests and CI boot
# without a vector DB or key. The "postgres" profile re-enables it.
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration,org.springframework.ai.autoconfigure.vectorstore.pgvector.PgVectorStoreAutoConfiguration

# JWT signing secret (Base64) and token lifetime. Override jwt.secret via the
# JWT_SECRET environment variable in production; never ship the default secret.
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration-ms=86400000

# Order confirmation email. With no SMTP host configured the app just logs the
# message. To actually send, set these (e.g. via env vars) and a JavaMailSender
# is auto-configured:
#   spring.mail.host=smtp.example.com
#   spring.mail.port=587
#   spring.mail.username=... / spring.mail.password=...
#   spring.mail.properties.mail.smtp.auth=true
#   spring.mail.properties.mail.smtp.starttls.enable=true
luxshop.mail.from=noreply@luxshop.example
