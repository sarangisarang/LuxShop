# PostgreSQL profile (dev / prod). Activate with: --spring.profiles.active=postgres
# Schema and seed data are owned by Flyway migrations (db/migration); Hibernate only
# validates that its entities match the migrated schema.
#
# The JDBC URL is taken from POSTGRES_URL when set (docker-compose, local dev).
# When it is not, the URL is assembled from discrete host/port/db parts so that
# managed hosts (e.g. Render) can wire it straight from their database bindings,
# which expose host/port/name separately rather than a ready jdbc: string.
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:55432}/${POSTGRES_DB:luxshop}}
spring.datasource.username=${POSTGRES_USER:luxshop}
spring.datasource.password=${POSTGRES_PASSWORD:luxshop}
spring.datasource.driver-class-name=org.postgresql.Driver

# Managed platforms assign the listening port via $PORT; fall back to 8080 for
# docker-compose and local runs where PORT is unset.
server.port=${PORT:8080}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.sql.init.mode=never
spring.h2.console.enabled=false
# Override the H2 default: with Flyway owning the schema, deferring datasource
# init would create a circular dependency between flyway and entityManagerFactory.
spring.jpa.defer-datasource-initialization=false
