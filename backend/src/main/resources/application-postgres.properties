# PostgreSQL profile (dev / prod). Activate with: --spring.profiles.active=postgres
# Schema and seed data are owned by Flyway migrations (db/migration); Hibernate only
# validates that its entities match the migrated schema.
#
# The JDBC URL is taken from POSTGRES_URL when set (docker-compose, local dev).
# When it is not, the URL is assembled from discrete host/port/db parts so that
# managed hosts (e.g. Render) can wire it straight from their database bindings,
# which expose host/port/name separately rather than a ready jdbc: string.
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:55432}/${POSTGRES_DB:luxshop}}
spring.datasource.username=${POSTGRES_USER:luxshop}
spring.datasource.password=${POSTGRES_PASSWORD:luxshop}
spring.datasource.driver-class-name=org.postgresql.Driver

# Managed platforms assign the listening port via $PORT; fall back to 8080 for
# docker-compose and local runs where PORT is unset.
server.port=${PORT:8080}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.sql.init.mode=never
spring.h2.console.enabled=false
# Override the H2 default: with Flyway owning the schema, deferring datasource
# init would create a circular dependency between flyway and entityManagerFactory.
spring.jpa.defer-datasource-initialization=false

# --- Spring AI / RAG (enabled only in this profile) ---
# The default profile excludes these auto-configs; clear the exclusion here so
# the OpenAI embedding client and the pgvector store load against Postgres.
spring.autoconfigure.exclude=

# Gemini through its OpenAI-compatible endpoint (just an API key, no GCP project).
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai
spring.ai.openai.api-key=${GEMINI_API_KEY:dummy-key}
# gemini-flash-lite-latest: fast, non-"thinking" model that stays available.
# gemini-flash-latest was persistently returning 429/503 under load, which
# broke the assistant; flash-lite answers directly (no reasoning tokens) and
# has served reliably. max-tokens is a generous cap, not a target.
spring.ai.openai.chat.options.model=gemini-flash-lite-latest
luxshop.assistant.max-tokens=1000
# gemini-embedding-001 is the current Gemini embedding model (text-embedding-004
# is no longer served); dimensions are requested down to the pgvector width.
spring.ai.openai.embedding.options.model=gemini-embedding-001

# pgvector store — text-embedding-004 produces 768-dim vectors.
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.initialize-schema=true
